# Network Monitoring Configuration

# Monitoring targets
monitoring:
  targets:
    - host: 172.16.100.101
      port: 22
      name: edge-server
    - host: 8.8.8.8
      port: 53
      name: dns-server

  # Monitoring intervals (seconds)
  intervals:
    ping: 60
    bandwidth: 10
    cpu: 10
    memory: 10
    disk: 60

# Prometheus metrics
prometheus:
  enabled: true
  port: 9091
  path: /metrics

# Alert configuration
alerts:
  enabled: true
  rules_file: config/alert_rules.yaml

# Notification channels
notifications:
  email:
    enabled: false
    smtp_host: smtp.gmail.com
    smtp_port: 587
    smtp_user: your-email@gmail.com
  webhook:
    enabled: false
    url: https://hooks.slack.com/services/...
  telegram:
    enabled: false
    bot_token: YOUR_BOT_TOKEN
    chat_id: YOUR_CHAT_ID

# Logging
logging:
  level: INFO
  file: logs/network-monitor.log
  max_bytes: 10485760  # 10MB
  backup_count: 5
