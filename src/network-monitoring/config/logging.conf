[loggers]
keys=root,network_monitor,alerts,metrics

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[logger_network_monitor]
level=INFO
handlers=consoleHandler,fileHandler
qualname=network_monitor
propagate=0

[logger_alerts]
level=INFO
handlers=consoleHandler,fileHandler
qualname=alerts
propagate=0

[logger_metrics]
level=INFO
handlers=consoleHandler,fileHandler
qualname=metrics
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=simpleFormatter
args=('logs/network-monitor.log', 'a', 10485760, 5)

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
